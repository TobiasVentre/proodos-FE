<section id="banner__multi-b2b" class="banner__form-b2b" data-element-ga="banner"
data-ga-business-team="" data-ga-business-mod="b2b"
data-ga-creativity-format="formulario integrado" data-ga-creativity-repository_id=""
data-ga-product-comercial_name=""
data-ga-product-comercial_id="">
<!--<<skeletonBanner>>-->
    <div class="contenedor">
        <div class="left-container">
            <div class="js__tag-segmento tag-segmento"></div>
            <div class="js__titulo-banner titulo"></div>
            <div class="formulario formulario-banner">
                <form class="form-group banner-input form-ic-c2c" autocomplete="off" id="form-banner" data-ic-form="form_c2c_0" novalidate="novalidate">
                    <div class="inputs_general">                        
                        
                        <div class="inputs_box">
                            <div class="custom-input">                
                                <div class="label-phone">Celular de contacto</div>
                                <span class="icono-input telefono"></span>
                                <input id="ani2" type="tel" maxlength="10" pattern="\d{10}" name="phone" placeholder="Celular de contacto" required data-ic-form-field="phone" class="anictc" onfocus="phoneInputFocus(this)"/>
                                <input id="codigoOrigenModal" type="hidden" name="Codigo_Origen" value="" class="orig" />
                                <input id="codigoCampanaModal" type="hidden" name="Codigo_Campana" value="" class="camp" />
                                <input id="infoModal" type="hidden" name="Codigo_Descripcion" value="" class="desc" />
                                <input id="horarioModal" type="hidden" name="Franja_Horaria" data-ic-form-field="scheduleTime" value="">
                                <input id="SessionID" type="hidden" name="SessionID" value="1" class="orig">
                            </div>
                            <div class="input-focus-hint">Ingresalo con cód. de área, sin 0 ni 15.</div>
                        </div>     
                        <div class="inputs_box">
                            <div class="custom-input">  
                                <div class="label-cuit">CUIT de tu negocio</div>
                                <input id="cuit-negocio" type="text" maxlength="11" pattern="\d{10}" name="cuit" placeholder="CUIT de tu negocio" required data-ic-form-field="cuit" class="cuitctc" onfocus="cuitInputFocus(this)"/>
                                <span class="icono-input cuit"></span>                              
                            </div>
                            <div class="input-focus-hint-cuit"></div>
                        </div>                       
                        
                    </div>         
                    <button 
                            type="submit"
                            class="form-ic-c2c-submit btn-primary-kenos full-width"
                            data-form-ic-c2c-send="true"
                            data-valor-plan="" 
                            >
                            Llamame ahora
                        </button>                       
                </form>                
            </div>
        </div>
        <div class="js__id-plan-203 right-container">
            <div class="router">
            <div class="box-1"><img src="/imagenes/b2b/multiproducto/banner-form/imagen-router.png" alt="Imagen de router"></div>
            <div class="box-2">
                <div class="box-up"><span class="js__capacidad-plan"></span></div>
                <div class="box-middle"><span class="js__tag-1"></span></div>
                <div class="box-down">
                    <box class="offer-price"><span>$</span><span class="js__precio-oferta"></span><span>+imp</span></box>
                    <box class="full-price"><span>Antes $</span><span class="js__full-price"></span></box>
                </div>
            </div>
            </div>
        </div>      
    </div>
</section>
