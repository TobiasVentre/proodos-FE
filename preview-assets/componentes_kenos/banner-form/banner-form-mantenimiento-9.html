<section class="banner__form-mantenimiento"
    data-ga-business-team="" data-ga-business-mod="b2c"

    <div class="contenido">
        
        <div class="texto">
            <div class="titulo">Estamos trabajando para darte el mejor servicio</div>

            <div class="formulario formulario-banner">
                <form class="form-group banner-input form-ic-c2c" autocomplete="off" id="form-banner" data-ic-form="form_c2c_0" novalidate="novalidate">
                    <div class="inputs_general">
                        <div class="inputs_box">
                            <div class="custom-input">
                                <div class="label-phone">Celular de contacto</div>
                                <input id="ani2" type="tel" maxlength="10" pattern="\d{10}" name="phone" placeholder="Celular de contacto" required data-ic-form-field="phone" class="anictc input-caja-banner" onfocus="phoneInputFocus(this)"/>
                                <span class="icono-input telefono"></span>
                                <input id="codigoOrigenModal" type="hidden" name="Codigo_Origen" value="LP_Ofertas Avatar_Hogar" class="orig" data-ic-form-field="Codigo_Origen">

                                <input id="infoModal" type="hidden" name="Codigo_Descripcion" value="Movistar Fibra" class="desc" data-ic-form-field="Codigo_Descripcion">
                                <input id="SessionID" type="hidden" name="SessionID" value="1" class="orig" data-ic-form-field="SessionID">
                                <input id="horarioModal" type="hidden" name="Franja_Horaria" data-ic-form-field="scheduleTime" value="">

                           <div class="input-focus-hint">Ingresalo con cód. de área, sin 0 ni 15.</div> 
                        </div>
                    </div>
                    <button
                    class="form-ic-c2c-submit btn-primary-kenos full-width"
                    data-valor-plan="Fibra 300mb" data-cod-campana="Fija_alta"
                    data-element-ga="link" data-ga-index="22" id="form_c2c_0_0" data-form-ic-c2c-send="true">
                    Quiero que me llamen
                    </button>
                </form>
            </div>
        </div>

        <div class="right-container">
            <img src="/imagenes/global/mantenimiento.png" alt="Imagen de persona realizando mantenimiento">
        </div>
    </div>
